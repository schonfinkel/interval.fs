version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci:"
    # This block groups all updates for this ecosystem together
    groups:
      github-actions-deps:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps:"
    groups:
      nuget-deps:
        patterns:
          - "*"

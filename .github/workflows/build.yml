name: "[Nix] Build & Tests"

on:
  push:
    branches: [ "master" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/**'
      - 'flake.nix'
      - 'flake.lock'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/**'
      - 'flake.nix'
      - 'flake.lock'

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        token: ${{ github.token }}

    - uses: DeterminateSystems/nix-installer-action@main
    - uses: DeterminateSystems/magic-nix-cache-action@main

    - name: Build
      run: nix build

    - name: Run testing suite with coverage
      run: |
        nix develop .#ci --impure -c \
          dotnet test \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput=${GITHUB_WORKSPACE}/coverage/

    - name: Code coverage summary
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: coverage/coverage.cobertura.xml
        badge: true
        format: markdown
        output: both
        thresholds: '60 80'

    - name: Publish coverage to job summary
      run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

    - name: Extract coverage percentage and color
      id: coverage
      run: |
        line_rate=$(grep -m1 -oP 'line-rate="\K[0-9.]+' coverage/coverage.cobertura.xml)
        percent=$(awk -v r="$line_rate" 'BEGIN { printf "%.1f", r * 100 }')
        color=$(awk -v p="$percent" 'BEGIN {
          if (p < 60) print "red"
          else if (p < 80) print "yellow"
          else print "green"
        }')
        echo "percent=$percent" >> $GITHUB_OUTPUT
        echo "color=$color" >> $GITHUB_OUTPUT

    - name: Generate coverage badge
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: jaywcjlove/generated-badges@main
      with:
        label: coverage
        status: ${{ steps.coverage.outputs.percent }}%
        color: ${{ steps.coverage.outputs.color }}
        output: badges/coverage.svg

    - name: Publish badge to gh-pages branch
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./badges
        keep_files: true

name: "[Release] Git"
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Create Release
        run: gh release create ${{ github.ref_name }} --generate-notes --latest
        env:
          GITHUB_TOKEN: ${{ github.token }}
